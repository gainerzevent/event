<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex">
    <title>キッチンカー売上報告・精算アプリ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        input[type="date"], input[type="number"], input[type="text"] {
            font-size: 16px !important; /* iOSのズーム防止 */
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        function App() {
            const [view, setView] = useState('form'); 
            const [receiptType, setReceiptType] = useState('all');

            // 日本時間の今日の日付を取得
            const getJSTDate = () => {
                const now = new Date();
                return new Intl.DateTimeFormat('ja-JP', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    timeZone: 'Asia/Tokyo'
                }).format(now).replace(/\//g, '-');
            };

            const today = getJSTDate();
            const initialState = {
                eventName: '', dateType: 'single', startDate: today, endDate: today,
                shopName: '', personInCharge: '', address: '',
                dailySales: [{ date: today, amount: '' }]
            };

            const [formData, setFormData] = useState(() => {
                try {
                    const saved = localStorage.getItem('kitchencar_report_data_v2');
                    return saved ? JSON.parse(saved) : initialState;
                } catch (e) {
                    return initialState;
                }
            });

            useEffect(() => {
                localStorage.setItem('kitchencar_report_data_v2', JSON.stringify(formData));
            }, [formData]);

            // 日付範囲の生成
            const generateDateRange = (start, end) => {
                if (!start) return [];
                if (!end || start > end) return [start];
                const dates = [];
                let curr = new Date(start);
                const last = new Date(end);
                while (curr <= last) {
                    dates.push(curr.toISOString().split('T')[0]);
                    curr.setDate(curr.getDate() + 1);
                }
                return dates;
            };

            // 営業日変更時の売上入力欄更新
            useEffect(() => {
                const { dateType, startDate, endDate } = formData;
                let newDates = [];
                if (dateType === 'single') {
                    newDates = startDate ? [startDate] : [];
                } else if (dateType === 'multiple' && startDate && endDate) {
                    newDates = generateDateRange(startDate, endDate);
                }
                
                setFormData(prev => {
                    const newDailySales = newDates.map(date => {
                        const existing = prev.dailySales.find(d => d.date === date);
                        return { date, amount: existing ? existing.amount : '' };
                    });
                    if (JSON.stringify(prev.dailySales) === JSON.stringify(newDailySales)) return prev;
                    return { ...prev, dailySales: newDailySales };
                });
            }, [formData.dateType, formData.startDate, formData.endDate]);

            const handleChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
            };

            const handleDailySaleChange = (date, amount) => {
                const val = amount === '' ? '' : Math.max(0, Number(amount));
                setFormData(prev => ({
                    ...prev,
                    dailySales: prev.dailySales.map(item => 
                        item.date === date ? { ...item, amount: val } : item
                    )
                }));
            };

            const calculations = useMemo(() => {
                const totalA = formData.dailySales.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                const taxIncludedA = Math.round(totalA - (totalA / 1.1));
                const feeB = Math.round(totalA * 0.1);
                const refundC = totalA - feeB;
                return { totalA, taxIncludedA, feeB, refundC };
            }, [formData.dailySales]);

            const handleProceedToConfirm = () => {
                if (!formData.eventName || !formData.shopName || !formData.personInCharge) {
                    alert("必須項目（＊）を入力してください。");
                    return;
                }
                setView('confirm');
                window.scrollTo(0, 0);
            };

            const generateLineMessage = () => {
                const { eventName, shopName, personInCharge, dateType, startDate, endDate, dailySales } = formData;
                const { totalA, taxIncludedA, feeB, refundC } = calculations;
                const dateStr = dateType === 'single' ? startDate : `${startDate} 〜 ${endDate}`;
                let dailyStr = dailySales.map(d => `${d.date}: ¥${Number(d.amount||0).toLocaleString()}`).join('\n');
                
                const message = `【売上報告・精算】\nイベント名: ${eventName}\n屋号: ${shopName}\n担当者: ${personInCharge}\n営業日: ${dateStr}\n\n■ 日別売上\n${dailyStr}\n\n■ 精算情報\nA 総売上: ¥${totalA.toLocaleString()} (内税: ¥${taxIncludedA.toLocaleString()})\nB 管理費(10%): ¥${feeB.toLocaleString()}\nC 返金額(90%): ¥${refundC.toLocaleString()}\n\n内容をご確認の上、精算をお願いいたします。\n\nURL: ${window.location.href}`;
                return encodeURIComponent(message);
            };

            // アイコン描画用（Lucideが未ロードの場合の対策）
            const Icon = ({ name, size = 20, className = "" }) => {
                if (typeof lucide === 'undefined' || !lucide[name]) return <span className={className} style={{display:'inline-block', width:size, height:size}}></span>;
                const LucideIcon = lucide[name];
                return <LucideIcon size={size} className={className} />;
            };

            const FormView = () => (
                <div className="max-w-xl mx-auto p-4 space-y-6 pb-12">
                    <div className="bg-blue-600 text-white p-6 rounded-2xl shadow-lg">
                        <h1 className="text-2xl font-bold flex items-center gap-2">
                            <Icon name="Calculator" size={28} />
                            売上報告・精算フォーム
                        </h1>
                        <p className="text-blue-100 text-sm mt-2 font-medium">
                            日本催事販売協会への報告と精算用領収書の発行が可能です。
                        </p>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-5">
                        <h3 className="font-bold text-gray-800 flex items-center gap-2 border-b pb-2">
                            <Icon name="Info" size={18} className="text-blue-500" /> 基本情報
                        </h3>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1">＊イベント名</label>
                            <input type="text" value={formData.eventName} onChange={(e) => handleChange('eventName', e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="例：〇〇フェスティバル" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-2">＊営業日設定</label>
                            <div className="flex gap-4 mb-3">
                                <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-4 py-2 rounded-lg border border-gray-200 flex-1 justify-center">
                                    <input type="radio" checked={formData.dateType === 'single'} onChange={() => handleChange('dateType', 'single')} className="w-4 h-4 text-blue-600" />
                                    <span className="text-sm font-bold">単日</span>
                                </label>
                                <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-4 py-2 rounded-lg border border-gray-200 flex-1 justify-center">
                                    <input type="radio" checked={formData.dateType === 'multiple'} onChange={() => handleChange('dateType', 'multiple')} className="w-4 h-4 text-blue-600" />
                                    <span className="text-sm font-bold">複数日</span>
                                </label>
                            </div>
                            <div className="flex items-center gap-2">
                                <input type="date" value={formData.startDate} onChange={(e) => handleChange('startDate', e.target.value)} className="flex-1 border border-gray-300 rounded-lg p-3 outline-none text-sm bg-gray-50" />
                                {formData.dateType === 'multiple' && (
                                    <>
                                        <span className="text-gray-400">〜</span>
                                        <input type="date" value={formData.endDate} onChange={(e) => handleChange('endDate', e.target.value)} className="flex-1 border border-gray-300 rounded-lg p-3 outline-none text-sm bg-gray-50" />
                                    </>
                                )}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1">＊屋号</label>
                                <input type="text" value={formData.shopName} onChange={(e) => handleChange('shopName', e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="店名を入力" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1">＊担当者名</label>
                                <input type="text" value={formData.personInCharge} onChange={(e) => handleChange('personInCharge', e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="お名前を入力" />
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-4">
                        <h3 className="font-bold text-gray-800 flex items-center gap-2 border-b pb-2">
                            <Icon name="Coins" size={18} className="text-amber-500" /> 日別売上入力（税込）
                        </h3>
                        {formData.dailySales.map((item) => (
                            <div key={item.date} className="flex items-center justify-between gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                <span className="text-xs font-bold text-gray-600">{item.date}</span>
                                <div className="relative w-3/5">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">¥</span>
                                    <input type="number" inputMode="numeric" value={item.amount} onChange={(e) => handleDailySaleChange(item.date, e.target.value)} className="w-full border border-gray-300 rounded-lg p-2 pl-8 outline-none text-right font-bold focus:ring-2 focus:ring-blue-500" placeholder="0" />
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-blue-50 rounded-2xl border border-blue-100 p-6 space-y-4 shadow-inner">
                        <div className="flex justify-between items-center text-sm font-bold text-blue-700">
                            <span>A. 総売上合計</span>
                            <span className="text-xl">¥{calculations.totalA.toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between items-center text-sm font-bold text-red-500">
                            <span>B. 管理費 (10%)</span>
                            <span className="text-xl">- ¥{calculations.feeB.toLocaleString()}</span>
                        </div>
                        <div className="border-t border-blue-200 pt-3 flex justify-between items-center text-lg font-bold text-blue-900">
                            <span>C. 返金額 (90%)</span>
                            <span className="text-3xl text-blue-600">¥{calculations.refundC.toLocaleString()}</span>
                        </div>
                    </div>

                    <button onClick={handleProceedToConfirm} className="w-full bg-blue-600 text-white font-bold text-lg py-5 rounded-2xl shadow-xl hover:bg-blue-700 active:scale-[0.98] transition-all">
                        報告内容を確認する
                    </button>
                </div>
            );

            const ConfirmView = () => (
                <div className="max-w-xl mx-auto p-4 space-y-6 pb-12 animate-in fade-in duration-300">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setView('form')} className="p-2 text-gray-500 hover:bg-gray-100 rounded-full">
                            <Icon name="ChevronLeft" size={28} />
                        </button>
                        <h2 className="text-xl font-bold text-gray-800">報告内容の確認</h2>
                    </div>

                    <div className="bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden">
                        <div className="bg-gray-800 text-white p-4 font-bold text-sm">報告サマリー</div>
                        <div className="p-6 space-y-4">
                            <div className="flex flex-col gap-1 border-b pb-3 border-gray-100">
                                <span className="text-xs text-gray-400 font-bold">イベント名</span>
                                <span className="font-bold">{formData.eventName}</span>
                            </div>
                            <div className="flex flex-col gap-1 border-b pb-3 border-gray-100">
                                <span className="text-xs text-gray-400 font-bold">屋号 / 担当者</span>
                                <span className="font-bold">{formData.shopName} / {formData.personInCharge}</span>
                            </div>
                            <div className="bg-blue-50 rounded-xl p-4 flex justify-between items-center">
                                <span className="font-bold text-blue-800">精算返金額(C)</span>
                                <span className="text-2xl font-black text-blue-600">¥{calculations.refundC.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <a href={`https://line.me/R/msg/text/?${generateLineMessage()}`} target="_blank" className="w-full bg-[#06C755] text-white font-bold text-lg py-5 rounded-2xl shadow-lg flex justify-center items-center gap-3 hover:opacity-90 active:scale-[0.98] transition-all">
                            <Icon name="Send" size={24} /> LINEで報告を送信
                        </a>
                        <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 flex items-start gap-3">
                            <Icon name="AlertCircle" size={20} className="text-amber-600 shrink-0 mt-0.5" />
                            <p className="text-sm text-amber-800 font-bold leading-relaxed">LINE送信後、担当者に声をかけて現地精算（現金受け取り）を完了させてください。</p>
                        </div>
                        
                        <div className="grid grid-cols-1 gap-3 pt-6">
                            <p className="text-xs font-bold text-gray-400 text-center uppercase tracking-widest">精算書類の発行</p>
                            <button onClick={() => { setReceiptType('user'); setView('receipt'); }} className="w-full bg-white border-2 border-gray-800 text-gray-800 font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50">
                                <Icon name="FileText" size={18} /> 出店者用 領収書を表示
                            </button>
                            <button onClick={() => { setReceiptType('admin'); setView('receipt'); }} className="w-full bg-white border-2 border-gray-800 text-gray-800 font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50">
                                <Icon name="FileCheck" size={18} /> 管理者用 受領控えを表示
                            </button>
                        </div>
                    </div>
                </div>
            );

            const ReceiptView = () => (
                <div className="max-w-2xl mx-auto p-4 space-y-8 pb-12">
                    <div className="flex items-center justify-between mb-4 no-print">
                        <button onClick={() => setView('confirm')} className="p-2 text-gray-500 flex items-center gap-1 text-sm font-bold bg-white rounded-lg border shadow-sm px-4">
                            <Icon name="ChevronLeft" size={18} /> 戻る
                        </button>
                        <button onClick={() => window.print()} className="bg-gray-800 text-white px-6 py-2 rounded-lg flex items-center gap-2 text-sm font-bold shadow-lg">
                            <Icon name="Printer" size={18} /> 印刷・PDF保存
                        </button>
                    </div>

                    {(receiptType === 'user' || receiptType === 'all') && (
                        <div className="bg-white p-10 border border-gray-300 shadow-sm relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-2 text-[10px] text-gray-300 font-mono">RECEIPT-U</div>
                            <h2 className="text-3xl text-center border-b-4 border-double border-gray-800 pb-2 mb-10 tracking-widest font-bold">受 領 書</h2>
                            <div className="flex justify-between items-end mb-8">
                                <div className="text-xl font-bold border-b-2 border-gray-800 pb-1 w-2/3">{formData.shopName} 様</div>
                                <div className="text-sm pb-1">No. {Date.now().toString().slice(-6)}</div>
                            </div>
                            <div className="text-sm text-right mb-2">{today}</div>
                            <div className="bg-gray-100 py-6 mb-10 border-y-2 border-gray-800">
                                <div className="text-center text-4xl font-black">
                                    <span className="text-2xl mr-2">金額</span>
                                    ¥{calculations.totalA.toLocaleString()}-
                                </div>
                            </div>
                            <div className="text-gray-800 mb-16 space-y-2 font-medium">
                                <p>但：{formData.eventName} 総売上金として</p>
                                <p>上記、正に受領いたしました。</p>
                            </div>
                            <div className="flex justify-end">
                                <div className="text-right border-t-2 border-gray-200 pt-4">
                                    <p className="font-black text-2xl mb-1">株式会社Gainerz</p>
                                    <p className="text-xs text-gray-500">登録番号：T4140002045728</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {(receiptType === 'admin' || receiptType === 'all') && (
                        <div className="bg-white p-10 border border-gray-300 shadow-sm relative overflow-hidden mt-8">
                            <div className="absolute top-0 right-0 p-2 text-[10px] text-gray-300 font-mono">RECEIPT-A</div>
                            <h2 className="text-3xl text-center border-b-4 border-double border-gray-800 pb-2 mb-10 tracking-widest font-bold">領 収 書</h2>
                            <div className="flex justify-between items-end mb-8">
                                <div className="text-xl font-bold border-b-2 border-gray-800 pb-1 w-2/3">株式会社Gainerz 御中</div>
                                <div className="text-sm pb-1">No. {Date.now().toString().slice(-6)}</div>
                            </div>
                            <div className="text-sm text-right mb-2">{today}</div>
                            <div className="bg-gray-100 py-6 mb-10 border-y-2 border-gray-800">
                                <div className="text-center text-4xl font-black">
                                    <span className="text-2xl mr-2">金額</span>
                                    ¥{calculations.refundC.toLocaleString()}-
                                </div>
                            </div>
                            <div className="text-gray-800 mb-16 space-y-2 font-medium">
                                <p>但：{formData.eventName} 売上精算 返金額として</p>
                                <p>上記、正に領収いたしました。</p>
                            </div>
                            <div className="flex justify-end">
                                <div className="text-right border-t-2 border-gray-200 pt-4">
                                    <p className="font-black text-2xl underline mb-1">{formData.shopName}</p>
                                    <p className="text-sm text-gray-500">担当：{formData.personInCharge}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    {view === 'form' && <FormView />}
                    {view === 'confirm' && <ConfirmView />}
                    {view === 'receipt' && <ReceiptView />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
